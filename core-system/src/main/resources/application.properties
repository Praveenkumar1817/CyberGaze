# CyberGaze Core Commander — Application Configuration
# =====================================================

# Server port (default Spring Boot: 8080)
server.port=8080

# Application name (used in logs and actuator)
spring.application.name=cybergaze-core-commander

# Logging: show [CyberGaze] messages prominently
logging.level.com.cybergaze=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
